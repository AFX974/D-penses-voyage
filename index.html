<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>✈️ Suivi des dépenses</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet"/>
<style>
  body { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
  .fade-in { animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const SUPABASE_URL = "https://iosfvzobqecpkioslrrb.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlvc2Z2em9icWVjcGtpb3NscnJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NjA1MTQsImV4cCI6MjA5ODIzNjUxNH0.0UoTYS4phOCAqxJHPvX6geZEL3eEZ5uivXbc64NSj3c";

async function apiFetch(path, options = {}) {
  const sep = path.includes("?") ? "&" : "?";
  const url = `${SUPABASE_URL}/rest/v1/${path}${sep}apikey=${SUPABASE_ANON}`;
  const res = await fetch(url, {
    ...options,
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_ANON,
      "Authorization": `Bearer ${SUPABASE_ANON}`,
      "Prefer": "return=representation",
      ...(options.headers || {}),
    },
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(txt);
  }
  return res.status === 204 ? null : res.json();
}

const PAYERS = ["Thomas", "Joane", "Louise"];
const CATEGORIES = [
  { value: "activités",  label: "🎭 Activités" },
  { value: "bar",        label: "🍺 Bar" },
  { value: "nourriture", label: "🍽️ Nourriture" },
  { value: "cadeaux",    label: "🎁 Cadeaux" },
  { value: "courses",    label: "🛒 Courses" },
  { value: "carburant",  label: "⛽ Carburant" },
  { value: "péages",     label: "🛣️ Péages" },
  { value: "taxes",      label: "🧾 Taxes" },
  { value: "hôtel",      label: "🏨 Hôtel" },
  { value: "transport",  label: "🚌 Transport" },
  { value: "Uber Cars",  label: "🚗 Uber Cars" },
  { value: "Uber Eats",  label: "🛵 Uber Eats" },
];

function fmt(amount) {
  return Number(amount).toLocaleString("fr-FR", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " €";
}

function today() {
  return new Date().toISOString().split("T")[0];
}

function getCategoryLabel(value) {
  return CATEGORIES.find(c => c.value === value)?.label ?? value;
}

function computeSettlement(expenses) {
  const totals = {};
  PAYERS.forEach(p => totals[p] = 0);
  expenses.forEach(e => totals[e.payer] = (totals[e.payer] || 0) + parseFloat(e.amount));
  const total = Object.values(totals).reduce((a, b) => a + b, 0);
  const share = total / PAYERS.length;
  const balances = PAYERS.map(p => ({ name: p, balance: totals[p] - share }));
  const creditors = balances.filter(b => b.balance > 0.005).sort((a, b) => b.balance - a.balance);
  const debtors   = balances.filter(b => b.balance < -0.005).sort((a, b) => a.balance - b.balance);
  const settlements = [];
  const cred = creditors.map(b => ({ ...b }));
  const debt = debtors.map(b => ({ ...b }));
  let i = 0, j = 0;
  while (i < cred.length && j < debt.length) {
    const amount = Math.min(cred[i].balance, -debt[j].balance);
    settlements.push({ from: debt[j].name, to: cred[i].name, amount });
    cred[i].balance -= amount;
    debt[j].balance += amount;
    if (Math.abs(cred[i].balance) < 0.005) i++;
    if (Math.abs(debt[j].balance) < 0.005) j++;
  }
  return { totals, total, balances, settlements };
}

function App() {
  const [view, setView] = React.useState("form");
  const [expenses, setExpenses] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [payer, setPayer] = React.useState(PAYERS[0]);
  const [category, setCategory] = React.useState(CATEGORIES[0].value);
  const [name, setName] = React.useState("");
  const [amount, setAmount] = React.useState("");
  const [date, setDate] = React.useState(today());
  const [notes, setNotes] = React.useState("");
  const [saving, setSaving] = React.useState(false);
  const [error, setError] = React.useState("");
  const [success, setSuccess] = React.useState("");
  const [filterPayer, setFilterPayer] = React.useState("Tous");
  const [filterCategory, setFilterCategory] = React.useState("Toutes");

  async function loadExpenses() {
    try {
      const data = await apiFetch("expenses?order=date.desc");
      data && data.sort((a, b) => new Date(b.created_at) - new Date(a.created_at) || new Date(b.date) - new Date(a.date));
      setExpenses(data || []);
      setError("");
    } catch(e) {
      setError("Erreur de connexion : " + e.message);
    } finally {
      setLoading(false);
    }
  }

  React.useEffect(() => { loadExpenses(); }, []);
  React.useEffect(() => {
    const interval = setInterval(loadExpenses, 30000);
    return () => clearInterval(interval);
  }, []);

  async function addExpense(e) {
    e.preventDefault();
    setError("");
    if (!amount || parseFloat(amount) <= 0) { setError("Veuillez saisir un montant valide."); return; }
    setSaving(true);
    try {
      const data = await apiFetch("expenses", {
        method: "POST",
        body: JSON.stringify({ payer, category, name, amount: parseFloat(amount), date, notes }),
      });
      setExpenses(prev => [data[0], ...prev]);
      setName(""); setAmount(""); setNotes(""); setDate(today());
      setSuccess("Dépense ajoutée !");
      setTimeout(() => setSuccess(""), 3000);
    } catch(e) { setError("Erreur : " + e.message); }
    finally { setSaving(false); }
  }

  async function deleteExpense(id) {
    if (!confirm("Supprimer cette dépense ?")) return;
    try {
      await apiFetch(`expenses?id=eq.${id}`, { method: "DELETE", headers: { "Prefer": "" } });
      setExpenses(prev => prev.filter(e => e.id !== id));
    } catch(e) { setError("Erreur : " + e.message); }
  }

  const { totals, total, balances, settlements } = computeSettlement(expenses);
  const filtered = expenses.filter(e =>
    (filterPayer === "Tous" || e.payer === filterPayer) &&
    (filterCategory === "Toutes" || e.category === filterCategory)
  );

  return (
    <div className="min-h-screen bg-gradient-to-br from-sky-50 to-indigo-50">
      <header className="bg-white shadow-sm border-b border-indigo-100 sticky top-0 z-10">
        <div className="max-w-3xl mx-auto px-4 py-4 flex items-center justify-between">
          <h1 className="text-2xl font-bold text-indigo-700 tracking-tight">✈️ Suivi des dépenses</h1>
          <div className="flex gap-2">
            <button onClick={() => setView("form")} className={`px-4 py-2 rounded-lg text-sm font-medium transition-colors ${view==="form"?"bg-indigo-600 text-white shadow":"bg-indigo-50 text-indigo-600 hover:bg-indigo-100"}`}>➕ Nouvelle</button>
            <button onClick={() => { setView("history"); loadExpenses(); }} className={`px-4 py-2 rounded-lg text-sm font-medium transition-colors ${view==="history"?"bg-indigo-600 text-white shadow":"bg-indigo-50 text-indigo-600 hover:bg-indigo-100"}`}>📋 Historique</button>
          </div>
        </div>
      </header>

      <div className="max-w-3xl mx-auto px-4 py-6 space-y-6">

        <div className="grid grid-cols-3 gap-3">
          {PAYERS.map(p => {
            const bal = balances.find(b => b.name === p);
            const pos = bal.balance >= 0;
            return (
              <div key={p} className="bg-white rounded-xl shadow-sm border border-indigo-100 p-4">
                <div className="flex items-center gap-2 mb-2">
                  <div className="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold text-sm">{p[0]}</div>
                  <span className="font-semibold text-gray-800 text-sm">{p}</span>
                </div>
                <div className="text-lg font-bold text-indigo-700">{fmt(totals[p])}</div>
                <div className={`text-xs mt-1 font-medium ${pos?"text-emerald-600":"text-rose-500"}`}>{pos?"+":""}{fmt(bal.balance)}</div>
              </div>
            );
          })}
        </div>

        <div className="bg-indigo-600 text-white rounded-xl shadow p-4 flex justify-between items-center">
          <span className="text-base font-semibold">Total général</span>
          <div className="flex items-center gap-3">
            <span className="text-2xl font-bold">{fmt(total)}</span>
            <button onClick={loadExpenses} title="Rafraîchir" className="opacity-70 hover:opacity-100 text-lg">🔄</button>
          </div>
        </div>

        {error && <div className="bg-rose-50 border border-rose-200 text-rose-700 px-4 py-3 rounded-lg text-sm fade-in">⚠️ {error}</div>}
        {success && <div className="bg-emerald-50 border border-emerald-200 text-emerald-700 px-4 py-3 rounded-lg text-sm fade-in">✅ {success}</div>}

        {view === "form" && (
          <div className="bg-white rounded-xl shadow-sm border border-indigo-100 p-6 fade-in">
            <h2 className="text-lg font-semibold text-gray-800 mb-4">Nouvelle dépense</h2>
            <form onSubmit={addExpense} className="space-y-4">
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium text-gray-600 mb-1">Payé par</label>
                  <select value={payer} onChange={e => setPayer(e.target.value)} className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
                    {PAYERS.map(p => <option key={p} value={p}>{p}</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-600 mb-1">Catégorie</label>
                  <select value={category} onChange={e => setCategory(e.target.value)} className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
                    {CATEGORIES.map(c => <option key={c.value} value={c.value}>{c.label}</option>)}
                  </select>
                </div>
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium text-gray-600 mb-1">Nom (optionnel)</label>
                  <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="Description..." className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-600 mb-1">Montant (€)</label>
                  <input type="number" value={amount} onChange={e => setAmount(e.target.value)} min="0.01" step="0.01" placeholder="0,00" required className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
                </div>
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium text-gray-600 mb-1">Date</label>
                  <input type="date" value={date} onChange={e => setDate(e.target.value)} required className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-600 mb-1">Notes</label>
                  <input type="text" value={notes} onChange={e => setNotes(e.target.value)} placeholder="Notes..." className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
                </div>
              </div>
              <button type="submit" disabled={saving} className="w-full bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white font-semibold py-2.5 rounded-lg transition-colors text-sm">
                {saving ? "Enregistrement..." : "➕ Ajouter la dépense"}
              </button>
            </form>
          </div>
        )}

        {view === "history" && (
          <div className="space-y-4 fade-in">
            <div className="bg-white rounded-xl shadow-sm border border-indigo-100 p-4">
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="block text-xs font-medium text-gray-500 mb-1">Personne</label>
                  <select value={filterPayer} onChange={e => setFilterPayer(e.target.value)} className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
                    <option value="Tous">Tous</option>
                    {PAYERS.map(p => <option key={p} value={p}>{p}</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-xs font-medium text-gray-500 mb-1">Catégorie</label>
                  <select value={filterCategory} onChange={e => setFilterCategory(e.target.value)} className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
                    <option value="Toutes">Toutes</option>
                    {CATEGORIES.map(c => <option key={c.value} value={c.value}>{c.label}</option>)}
                  </select>
                </div>
              </div>
            </div>
            <div className="bg-white rounded-xl shadow-sm border border-indigo-100 overflow-hidden">
              <div className="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
                <h2 className="text-lg font-semibold text-gray-800">{loading ? "Chargement..." : `${filtered.length} dépense${filtered.length!==1?"s":""}`}</h2>
                {filtered.length > 0 && <span className="text-sm font-bold text-indigo-700">{fmt(filtered.reduce((s,e)=>s+parseFloat(e.amount),0))}</span>}
              </div>
              {loading ? (
                <div className="px-6 py-10 text-center text-gray-400 text-sm">Chargement...</div>
              ) : filtered.length === 0 ? (
                <div className="px-6 py-10 text-center text-gray-400 text-sm">Aucune dépense enregistrée.</div>
              ) : (
                <ul className="divide-y divide-gray-100">
                  {filtered.map(e => (
                    <li key={e.id} className="px-6 py-4 hover:bg-gray-50 flex items-start gap-4">
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 flex-wrap">
                          <span className="font-semibold text-gray-800">{e.name || getCategoryLabel(e.category)}</span>
                          <span className="text-xs bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded-full">{getCategoryLabel(e.category)}</span>
                        </div>
                        <div className="text-xs text-gray-500 mt-0.5">
                          <span className="font-medium text-indigo-600">{e.payer}</span>{" · "}
                          {new Date(e.date+"T00:00:00").toLocaleDateString("fr-FR")}
                          {e.notes && <span> · <span className="italic">{e.notes}</span></span>}
                        </div>
                      </div>
                      <div className="flex items-center gap-3 shrink-0">
                        <span className="font-bold text-gray-800">{fmt(parseFloat(e.amount))}</span>
                        <button onClick={() => deleteExpense(e.id)} className="text-rose-400 hover:text-rose-600 transition-colors">🗑️</button>
                      </div>
                    </li>
                  ))}
                </ul>
              )}
            </div>
          </div>
        )}

        {total > 0 && (
          <div className="bg-white rounded-xl shadow-sm border border-indigo-100 p-6">
            <h2 className="text-lg font-semibold text-gray-800 mb-4">⚖️ Règlement des comptes</h2>
            {settlements.length === 0 ? (
              <p className="text-sm text-emerald-600 font-medium">✅ Tout est équilibré !</p>
            ) : (
              <div className="space-y-2">
                {settlements.map((s,i) => (
                  <div key={i} className="flex items-center gap-2 text-sm flex-wrap">
                    <span className="font-semibold text-rose-600">{s.from}</span>
                    <span className="text-gray-400">doit payer</span>
                    <span className="font-bold text-indigo-700">{fmt(s.amount)}</span>
                    <span className="text-gray-400">à</span>
                    <span className="font-semibold text-emerald-600">{s.to}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
